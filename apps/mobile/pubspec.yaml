name: baby_mon
description: BabyMon - Smart Evolving Parenting Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  provider: ^6.0.5
  get_it: ^7.6.4
  intl: ^0.20.2
  local_auth: ^2.3.0
  dio: ^5.3.3
  flutter_secure_storage: ^9.0.0
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.0
  shared_preferences: ^2.2.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  flutter_facebook_auth: ^7.0.1
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.1
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  fl_chart: ^0.69.0
  image_picker: ^1.1.0
  phosphor_flutter:
    path: packages/phosphor_flutter
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  device_info_plus: ^11.3.0
  llamadart: ^0.8.3
  audioplayers: ^6.0.0
  crypto: ^3.0.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  flutter_launcher_icons: ^0.14.4
  integration_test:
    sdk: flutter

  image: any
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/Syne-ExtraBold.ttf
    - assets/fonts/Syne-Bold.ttf
    - assets/fonts/Syne-SemiBold.ttf
    - assets/fonts/PlusJakartaSans-SemiBold.ttf
    - assets/fonts/PlusJakartaSans-Regular.ttf
    - assets/fonts/PlusJakartaSans-Medium.ttf
    - assets/audio/
    - assets/images/enas_chat.png
    - assets/badges/
