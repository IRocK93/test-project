name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: babymon_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/api
        run: npm ci

      - name: Run linter
        working-directory: ./apps/api
        run: npm run lint || true

      - name: Run typecheck
        working-directory: ./apps/api
        run: npm run typecheck

      - name: Generate Prisma client
        working-directory: ./apps/api
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./apps/api
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: ./apps/api
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/babymon_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test

      - name: Build application
        working-directory: ./apps/api
        run: npm run build

  flutter-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Run Flutter analyzer
        working-directory: ./apps/mobile
        run: flutter analyze --no-pub

      - name: Run Flutter tests (includes golden comparison)
        working-directory: ./apps/mobile
        run: flutter test

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: apps/mobile/test/golden/failures/
          retention-days: 7

  update-goldens:
    runs-on: ubuntu-latest
    needs: flutter-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Regenerate golden baselines
        working-directory: ./apps/mobile
        run: flutter test test/golden/ --update-goldens

      - name: Commit updated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/test/golden/goldens/
          git diff --cached --quiet || git commit -m "chore: update golden baselines [skip ci]"
          git push

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: babymon/api:${{ github.sha }}
          load: true

      - name: Run container smoke test
        run: |
          docker run -d --name test-api -p 3001:3000 babymon/api:${{ github.sha }}
          sleep 15
          curl -f http://localhost:3001/health || exit 1
          docker stop test-api
