name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: babymon_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/api
        run: npm ci

      - name: Run linter
        working-directory: ./apps/api
        run: npm run lint

      - name: Run typecheck
        working-directory: ./apps/api
        run: npm run typecheck

      - name: Generate Prisma client
        working-directory: ./apps/api
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./apps/api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/babymon_test?schema=public

      - name: Verify Prisma schema is fully migrated (no db push drift)
        working-directory: ./apps/api
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "postgresql://postgres:postgres@localhost:5432/babymon_shadow?schema=public" \
            --exit-code
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/babymon_test?schema=public

      - name: Run tests
        working-directory: ./apps/api
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/babymon_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test

      - name: Build application
        working-directory: ./apps/api
        run: npm run build

  golden-components:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Run component golden tests
        working-directory: ./apps/mobile
        run: flutter test test/golden/golden_components_test.dart

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-component-failures
          path: apps/mobile/test/golden/failures/
          retention-days: 7

  golden-screens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Run screen golden tests
        working-directory: ./apps/mobile
        run: flutter test test/golden/golden_screens_test.dart

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-screen-failures
          path: apps/mobile/test/golden/failures/
          retention-days: 7

  golden-states:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Run state golden tests
        working-directory: ./apps/mobile
        run: flutter test test/golden/golden_states_test.dart

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-state-failures
          path: apps/mobile/test/golden/failures/
          retention-days: 7

  golden-rtl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Run RTL golden tests
        working-directory: ./apps/mobile
        run: flutter test test/golden/golden_rtl_test.dart

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-rtl-failures
          path: apps/mobile/test/golden/failures/
          retention-days: 7

  flutter-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Run Flutter analyzer
        working-directory: ./apps/mobile
        run: flutter analyze --no-pub

      - name: Check for hardcoded TextDirection values
        working-directory: ./apps/mobile
        run: bash scripts/check_textdirection.sh

      - name: Run Flutter tests (excluding golden tests)
        working-directory: ./apps/mobile
        run: flutter test --exclude-tags golden

      - name: Verify Flutter build compiles
        working-directory: ./apps/mobile
        run: flutter build apk --debug

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: apps/mobile/test/golden/failures/
          retention-days: 7

  update-goldens:
    runs-on: ubuntu-latest
    needs: [golden-components, golden-screens, golden-states, golden-rtl]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./apps/mobile
        run: flutter pub get

      - name: Regenerate golden baselines
        working-directory: ./apps/mobile
        run: flutter test test/golden/ --update-goldens

      - name: Commit updated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/test/golden/goldens/
          git diff --cached --quiet || git commit -m "chore: update golden baselines [skip ci]"
          git push

  slack-notification:
    runs-on: ubuntu-latest
    needs: [lint-and-test, golden-components, golden-screens, golden-states, golden-rtl]
    if: failure()

    steps:
      - name: Send Slack notification on failure
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {

              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *CI/CD Pipeline Failed*\n*Workflow:* `${{ github.workflow }}`\n*Branch:* `${{ github.ref_name }}`\n*Actor:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: babymon/api:${{ github.sha }}
          load: true

      - name: Run container smoke test
        run: |
          docker run -d --name test-api -p 3001:3000 babymon/api:${{ github.sha }}
          sleep 15
          curl -f http://localhost:3001/api/v1/health/live || exit 1
          docker stop test-api
